name: barberia_fidelizacion
description: Sistema de fidelizacion para barberias
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Supabase
  supabase_flutter: ^2.5.0

  # Routing
  go_router: ^14.1.0

  # UI Utilities
  intl: ^0.19.0
  google_fonts: ^6.2.1
  flutter_slidable: ^3.1.0
  shimmer: ^3.0.0

  # Forms y validacion
  flutter_form_builder: ^9.2.1
  form_builder_validators: ^10.0.0

  # Fechas y calendario
  table_calendar: ^3.1.0

  # Graficos
  fl_chart: ^0.68.0

  # Icons
  phosphor_flutter: ^2.1.0

  # Utilidades
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true
  assets:
    - assets/images/